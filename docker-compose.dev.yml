services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      WATCHPACK_POLLING: true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - redis
    restart: always

volumes:
  redis-data:
