services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-defaultpassword}
      - REDISINSIGHT_HOST=0.0.0.0
      - REDISINSIGHT_PORT=8001
      - RI_APP_PORT=8001
      - RI_APP_HOST=0.0.0.0
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-defaultpassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    image: exponentor/xsite-apis:latest
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-defaultpassword}
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis-data:
