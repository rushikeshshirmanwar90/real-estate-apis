# ============================================================================
# Docker Compose Configuration for Real Estate APIs
# ============================================================================
#
# This file defines 2 services:
#   1. redis    - Cache/session container  
#   2. web      - Next.js application container
#
# MongoDB is hosted separately - see docker-compose.mongodb.yml
#
# ENVIRONMENT VARIABLES:
#   This file reads variables from the .env file in the same directory.
#   Variables are referenced using ${VARIABLE_NAME} syntax.
#
# HOW TO USE:
#   1. Create .env file: cp .env.docker .env
#   2. Edit .env with your values
#   3. Set DB_URL and MONGODB_URI to your external MongoDB server
#   4. Start services: docker-compose up -d
#
# VARIABLE FLOW:
#   .env file → docker-compose.yml → containers
#
# See ENV_FILES_GUIDE.md for detailed documentation
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Redis Cache Container
  # --------------------------------------------------------------------------
  # Receives from .env:
  #   - REDIS_PASSWORD (used to secure Redis)
  # --------------------------------------------------------------------------
  redis:
    image: redis/redis-stack:latest
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-defaultpassword}
      - REDISINSIGHT_HOST=0.0.0.0
      - REDISINSIGHT_PORT=8001
      - RI_APP_PORT=8001
      - RI_APP_HOST=0.0.0.0
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-defaultpassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --------------------------------------------------------------------------
  # Web Application Container (Next.js)
  # --------------------------------------------------------------------------
  # Receives from .env:
  #   - DB_URL (MongoDB connection string to external server)
  #   - MONGODB_URI (MongoDB connection string to external server)
  #   - REDIS_PASSWORD
  #   - JWT_SECRET, NEXTAUTH_SECRET, NEXTAUTH_URL
  #   - DOMAIN
  #   - SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS
  #   - NEXT_PUBLIC_CLIENT_ID, NEXT_PUBLIC_AUTHENTICATION_CODE
  #
  # Note: DB_URL and MONGODB_URI should point to your external MongoDB server
  #   Example: mongodb://user:pass@mongodb-server-ip:27017/realEstate
  #   Or MongoDB Atlas: mongodb+srv://user:pass@cluster.mongodb.net/realEstate
  # --------------------------------------------------------------------------
  web:
    image: exponentor/xsite-apis:latest
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-defaultpassword}
      DB_URL: ${DB_URL}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      SALT_ID: ${SALT_ID:-10}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DOMAIN: ${DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NEXT_PUBLIC_CLIENT_ID: ${NEXT_PUBLIC_CLIENT_ID}
      NEXT_PUBLIC_AUTHENTICATION_CODE: ${NEXT_PUBLIC_AUTHENTICATION_CODE}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis-data:
