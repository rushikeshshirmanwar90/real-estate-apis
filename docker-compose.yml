services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: 'production'
      DB_URL: '${DB_URL}'
      REDIS_HOST: '${REDIS_HOST}'
      REDIS_PORT: '${REDIS_PORT}'
      REDIS_PASSWORD: '${REDIS_PASSWORD}'
      SALT_ID: '${SALT_ID}'
      JWT_SECRET: '${JWT_SECRET}'
      DOMAIN: '${DOMAIN}'
      SMTP_HOST: '${SMTP_HOST}'
      SMTP_PORT: '${SMTP_PORT}'
      SMTP_SECURE: '${SMTP_SECURE}'
      SMTP_USER: '${SMTP_USER}'
      SMTP_PASS: '${SMTP_PASS}'
      NEXT_PUBLIC_CLIENT_ID: '${NEXT_PUBLIC_CLIENT_ID}'
      NEXT_PUBLIC_AUTHENTICATION_CODE: '${NEXT_PUBLIC_AUTHENTICATION_CODE}'
    restart: always