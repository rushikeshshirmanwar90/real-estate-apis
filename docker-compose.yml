services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis-data:/data
    env_file:
      - .env
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: real-estate-apis-web:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis-data:
